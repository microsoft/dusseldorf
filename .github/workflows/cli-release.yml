name: Release CLI Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'dusseldorf cli release'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dssldrf
            asset_name: dssldrf-linux-amd64
          - os: macos-latest
            artifact_name: dssldrf
            asset_name: dssldrf-macos-amd64
          - os: windows-latest
            artifact_name: dssldrf.exe
            asset_name: dssldrf-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install ./cli

      - name: Build one-file binary
        run: |
          pyinstaller --onefile --name dssldrf cli/bin/dssldrf_entry.py

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream
        if: github.event_name == 'release'

      - name: Upload artifact for manual workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./dist/${{ matrix.artifact_name }}
        if: github.event_name == 'workflow_dispatch'
