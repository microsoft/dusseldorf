name: Build CLI Binaries

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "cli/**"
      - ".github/workflows/cli-binaries.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli-binaries.yml"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install ./cli

      - name: Build one-file binary
        run: |
          pyinstaller --onefile --name dssldrf cli/bin/dssldrf_entry.py

      - name: Upload Linux/macOS artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: dssldrf-${{ runner.os }}
          path: dist/dssldrf

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: dssldrf-${{ runner.os }}
          path: dist/dssldrf.exe
